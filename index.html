<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Translator DE / EN / TH (Auto-Fallback)</title>
  <style>
    *{box-sizing:border-box}
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;margin:0;background:#f4f4f4}
    .wrap{max-width:1050px;margin:0 auto;padding:16px}
    h1{margin:6px 0 6px 0;font-size:22px}
    .muted{color:#666;font-size:13px;margin:0 0 12px 0}
    .card{background:#fff;border-radius:14px;box-shadow:0 2px 10px rgba(0,0,0,.08);padding:14px;margin:12px 0}
    .grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}
    @media (max-width:900px){.grid{grid-template-columns:1fr}}
    label{display:block;font-weight:650;margin:0 0 8px 0}
    textarea{
      width:100%; min-height:170px; resize:vertical;
      padding:12px; border:1px solid #d8d8d8; border-radius:10px;
      font-size:16px; line-height:1.35;
    }
    textarea:focus{outline:2px solid #2563eb33;border-color:#2563eb}
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    button{
      border:1px solid #d8d8d8;background:#fff;border-radius:10px;
      padding:10px 12px;cursor:pointer;font-size:13px
    }
    button:hover{background:#f3f3f3}
    .status{font-size:13px;color:#111}
    .error{font-size:13px;color:#b00020;margin-top:8px}
    .pill{display:inline-block;padding:3px 8px;border-radius:999px;background:#eef2ff;font-size:12px;color:#1f2a44}
    code{background:#f6f6f6;padding:.1rem .25rem;border-radius:4px}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Translator: Deutsch ↔ English ↔ ไทย</h1>
    <p class="muted">
      Auto: versucht Offline‑KI (Transformers.js) → wenn blockiert, Online‑Mirror (LibreTranslate ohne Key).
    </p>

    <div class="card">
      <div class="row">
        <span class="pill" id="backendPill">Backend: Auto</span>
        <button id="btnInit" type="button">Initialisieren</button>
        <button id="btnClear" type="button">Alles leeren</button>
        <span class="status" id="status"></span>
      </div>
      <div class="error" id="err" style="display:none;"></div>
      <p class="muted" style="margin:8px 0 0 0">
        Offline‑KI lädt beim ersten Mal ein Modell. Online‑Fallback nutzt <code>POST /translate</code>. [page:3]
      </p>
    </div>

    <div class="grid">
      <div class="card">
        <label for="de">Deutsch (de)</label>
        <textarea id="de" placeholder="Text auf Deutsch …"></textarea>
      </div>
      <div class="card">
        <label for="en">English (en)</label>
        <textarea id="en" placeholder="Text in English …"></textarea>
      </div>
      <div class="card">
        <label for="th">ไทย (th)</label>
        <textarea id="th" placeholder="ข้อความภาษาไทย …"></textarea>
      </div>
    </div>
  </div>

<script>
(() => {
  // ---------------- UI ----------------
  const deEl = document.getElementById('de');
  const enEl = document.getElementById('en');
  const thEl = document.getElementById('th');
  const statusEl = document.getElementById('status');
  const errEl = document.getElementById('err');
  const backendPill = document.getElementById('backendPill');
  const btnInit = document.getElementById('btnInit');
  const btnClear = document.getElementById('btnClear');

  function setStatus(s){ statusEl.textContent = s || ''; }
  function showError(s){
    errEl.style.display = s ? 'block' : 'none';
    errEl.textContent = s || '';
  }
  function setBackendLabel(s){ backendPill.textContent = 'Backend: ' + s; }

  // ---------------- State ----------------
  let isAuto = false;
  let debounceTimer = null;
  let reqId = 0;

  // ---------------- Online mirrors ----------------
  // Mirrors list: LibreTranslate docs (some require key; these two are listed without "API Key Required") [page:1]
  const MIRRORS = [
    'https://translate.flossboxin.org.in',
    'https://lt.blitzw.in'
  ];

  async function translateOnline(text, source, target, signal) {
    let lastErr = null;
    for (const base of MIRRORS) {
      try {
        const url = base.replace(/\/+$/, '') + '/translate';
        // LibreTranslate: POST /translate with q, source, target, format, optional api_key [page:3]
        const res = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ q: text, source, target, format: 'text' }),
          signal
        });

        const payload = await res.json().catch(async () => ({ error: await res.text() }));
        if (!res.ok) throw new Error(payload?.error || payload?.message || ('HTTP ' + res.status));

        const out = payload?.translatedText;
        if (typeof out !== 'string') throw new Error('Online: translatedText fehlt.');
        return out;
      } catch (e) {
        lastErr = e;
      }
    }
    throw new Error('Online-Mirror fehlgeschlagen: ' + (lastErr?.message || lastErr || 'unknown'));
  }

  // ---------------- Offline (Transformers.js) ----------------
  // CDN usage via script tag is documented (jsDelivr and UNPKG examples). [web:429]
  const TF_SOURCES = [
    './transformers.min.js', // optional: wenn du es später lokal ins Repo legst
    'https://cdn.jsdelivr.net/npm/@xenova/transformers/dist/transformers.min.js',
    'https://www.unpkg.com/@xenova/transformers/dist/transformers.min.js'
  ];

  const NLLB_LANG = { de:'deu_Latn', en:'eng_Latn', th:'tha_Thai' };
  let offlineTranslator = null;
  let offlineInitPromise = null;

  function loadScript(src) {
    return new Promise((resolve, reject) => {
      const s = document.createElement('script');
      s.src = src;
      s.async = true;
      s.onload = () => resolve(true);
      s.onerror = () => reject(new Error('Script load failed: ' + src));
      document.head.appendChild(s);
    });
  }

  async function ensureTransformersLoaded() {
    if (window.transformers?.pipeline) return true;

    let last = null;
    for (const src of TF_SOURCES) {
      try {
        await loadScript(src);
        if (window.transformers?.pipeline) return true;
      } catch (e) {
        last = e;
      }
    }
    throw last || new Error('Transformers.js nicht verfügbar');
  }

  async function initOffline() {
    if (offlineTranslator) return offlineTranslator;
    if (offlineInitPromise) return offlineInitPromise;

    offlineInitPromise = (async () => {
      setBackendLabel('Offline-KI lädt …');
      setStatus('Lade Transformers.js …');
      await ensureTransformersLoaded();

      setStatus('Lade Übersetzungsmodell (einmalig) …');
      // NLLB: ein Modell für viele Sprachen
      offlineTranslator = await window.transformers.pipeline('translation', 'Xenova/nllb-200-distilled-600M');
      setBackendLabel('Offline-KI');
      setStatus('Offline-KI bereit.');
      return offlineTranslator;
    })();

    return offlineInitPromise;
  }

  async function translateOffline(text, source, target, myReqId) {
    const t = await initOffline();
    if (myReqId !== reqId) return null;
    const out = await t(text, { src_lang: NLLB_LANG[source], tgt_lang: NLLB_LANG[target] });
    if (myReqId !== reqId) return null;
    const translated = out?.[0]?.translation_text;
    if (typeof translated !== 'string') throw new Error('Offline-KI: Unerwartete Antwort.');
    return translated;
  }

  // ---------------- Auto strategy ----------------
  async function translateAuto(text, source, target, myReqId) {
    // 1) Offline zuerst versuchen (wenn möglich)
    try {
      return await translateOffline(text, source, target, myReqId);
    } catch (_) {
      // 2) Online Mirrors ohne Key
      setBackendLabel('Online-Mirror');
      const ac = new AbortController();
      const signal = ac.signal;

      // Soft-abort bei neuer Eingabe
      const myLocal = myReqId;
      const timer = setInterval(() => {
        if (myLocal !== reqId) { ac.abort(); clearInterval(timer); }
      }, 120);

      try {
        const out = await translateOnline(text, source, target, signal);
        clearInterval(timer);
        return out;
      } catch (e) {
        clearInterval(timer);
        throw e;
      }
    }
  }

  // ---------------- Main flow ----------------
  function schedule(from) {
    if (isAuto) return;
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(() => run(from), 450);
  }

  async function run(from) {
    const map = { de: deEl.value, en: enEl.value, th: thEl.value };
    const text = (map[from] || '').trim();

    showError('');
    if (!text) {
      isAuto = true;
      if (from !== 'de') deEl.value = '';
      if (from !== 'en') enEl.value = '';
      if (from !== 'th') thEl.value = '';
      isAuto = false;
      setStatus('');
      return;
    }

    reqId++;
    const myReqId = reqId;
    setStatus('Übersetze …');

    try {
      const targets = ['de','en','th'].filter(x => x !== from);
      const [a, b] = targets;

      const [ta, tb] = await Promise.all([
        translateAuto(text, from, a, myReqId),
        translateAuto(text, from, b, myReqId),
      ]);

      if (myReqId !== reqId) return;

      isAuto = true;
      if (a === 'de') deEl.value = ta; if (a === 'en') enEl.value = ta; if (a === 'th') thEl.value = ta;
      if (b === 'de') deEl.value = tb; if (b === 'en') enEl.value = tb; if (b === 'th') thEl.value = tb;
      isAuto = false;

      setStatus('Fertig.');
    } catch (e) {
      setStatus('');
      showError('Fehler: ' + (e?.message || e));
    }
  }

  // ---------------- Buttons ----------------
  btnInit.addEventListener('click', async () => {
    showError('');
    setBackendLabel('Auto');
    setStatus('Initialisiere …');
    try {
      await initOffline();
      setStatus('OK (Offline-KI verfügbar).');
    } catch (e) {
      setBackendLabel('Online-Mirror');
      setStatus('');
      showError('Offline-KI nicht möglich (CDN/Netz blockiert?). Online-Mirror aktiv. Details: ' + (e?.message || e));
    }
  });

  btnClear.addEventListener('click', () => {
    showError(''); setStatus('');
    isAuto = true; deEl.value=''; enEl.value=''; thEl.value=''; isAuto = false;
  });

  // ---------------- Events ----------------
  deEl.addEventListener('input', () => schedule('de'));
  enEl.addEventListener('input', () => schedule('en'));
  thEl.addEventListener('input', () => schedule('th'));

  // Start: Auto warmup (nicht blockierend)
  setBackendLabel('Auto');
  initOffline().catch(() => { setBackendLabel('Online-Mirror'); });
})();
</script>
</body>
</html>
