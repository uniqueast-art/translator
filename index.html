
 <!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Translator DE / EN / TH (ohne API-Key)</title>
  <style>
    *{box-sizing:border-box}
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;margin:0;background:#f4f4f4}
    .wrap{max-width:1050px;margin:0 auto;padding:16px}
    h1{margin:6px 0 6px 0;font-size:22px}
    .muted{color:#666;font-size:13px;margin:0 0 12px 0}
    .card{background:#fff;border-radius:14px;box-shadow:0 2px 10px rgba(0,0,0,.08);padding:14px;margin:12px 0}
    .grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}
    @media (max-width:900px){.grid{grid-template-columns:1fr}}
    label{display:block;font-weight:650;margin:0 0 8px 0}
    textarea{
      width:100%; min-height:170px; resize:vertical;
      padding:12px; border:1px solid #d8d8d8; border-radius:10px;
      font-size:16px; line-height:1.35;
    }
    textarea:focus{outline:2px solid #2563eb33;border-color:#2563eb}
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    button{
      border:1px solid #d8d8d8;background:#fff;border-radius:10px;
      padding:10px 12px;cursor:pointer;font-size:13px
    }
    button:hover{background:#f3f3f3}
    .status{font-size:13px;color:#111}
    .error{font-size:13px;color:#b00020;margin-top:8px}
    .pill{display:inline-block;padding:3px 8px;border-radius:999px;background:#eef2ff;font-size:12px;color:#1f2a44}
    code{background:#f6f6f6;padding:.1rem .25rem;border-radius:4px}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Translator: Deutsch ↔ English ↔ ไทย</h1>
    <p class="muted">
      Läuft ohne API‑Key: nutzt MyMemory per <code>GET</code> mit <code>q</code> und <code>langpair=SRC|TGT</code>.
    </p>

    <div class="card">
      <div class="row">
        <span class="pill">Backend: MyMemory (kein Key)</span>
        <button id="btnClear" type="button">Alles leeren</button>
        <span class="status" id="status"></span>
      </div>
      <div class="error" id="err" style="display:none;"></div>
      <p class="muted" style="margin:8px 0 0 0">
        Hinweis: Kostenlos nutzbar, aber es gibt Limits/Rate‑Limits (bei sehr viel Text ggf. warten/nochmal versuchen).
      </p>
    </div>

    <div class="grid">
      <div class="card">
        <label for="de">Deutsch (de)</label>
        <textarea id="de" placeholder="Text auf Deutsch …"></textarea>
      </div>
      <div class="card">
        <label for="en">English (en)</label>
        <textarea id="en" placeholder="Text in English …"></textarea>
      </div>
      <div class="card">
        <label for="th">ไทย (th)</label>
        <textarea id="th" placeholder="ข้อความภาษาไทย …"></textarea>
      </div>
    </div>
  </div>

<script>
(() => {
  // MyMemory endpoint format: /get?q=...&langpair=en|it [web:494][web:501]
  const API_BASE = "https://api.mymemory.translated.net/get";
  const LS_KEY = "translator_de_en_th_mymemory_v1";

  const deEl = document.getElementById("de");
  const enEl = document.getElementById("en");
  const thEl = document.getElementById("th");
  const statusEl = document.getElementById("status");
  const errEl = document.getElementById("err");
  const btnClear = document.getElementById("btnClear");

  let isAuto = false;
  let debounceTimer = null;
  let requestId = 0;

  function setStatus(s){ statusEl.textContent = s || ""; }
  function showError(s){
    errEl.style.display = s ? "block" : "none";
    errEl.textContent = s || "";
  }

  function saveState() {
    try {
      localStorage.setItem(LS_KEY, JSON.stringify({
        de: deEl.value, en: enEl.value, th: thEl.value, savedAt: new Date().toISOString()
      }));
    } catch (_) {}
  }

  function loadState() {
    try {
      const raw = localStorage.getItem(LS_KEY);
      if (!raw) return;
      const s = JSON.parse(raw);
      if (typeof s.de === "string") deEl.value = s.de;
      if (typeof s.en === "string") enEl.value = s.en;
      if (typeof s.th === "string") thEl.value = s.th;
    } catch (_) {}
  }

  async function translate(text, src, tgt, myReqId) {
    const url = new URL(API_BASE);
    url.searchParams.set("q", text);
    url.searchParams.set("langpair", `${src}|${tgt}`);

    const res = await fetch(url.toString(), { cache: "no-store" });
    const data = await res.json().catch(() => ({}));

    if (myReqId !== requestId) return null; // ignore stale results

    // API example response includes responseData.translatedText [web:494]
    const out = data?.responseData?.translatedText;
    if (typeof out !== "string") {
      const msg = data?.responseDetails || "Unbekannter Fehler";
      throw new Error(msg);
    }
    return out;
  }

  function schedule(from) {
    if (isAuto) return;
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(() => run(from), 450);
  }

  async function run(from) {
    const map = { de: deEl.value, en: enEl.value, th: thEl.value };
    const text = (map[from] || "").trim();

    showError("");
    if (!text) {
      isAuto = true;
      if (from !== "de") deEl.value = "";
      if (from !== "en") enEl.value = "";
      if (from !== "th") thEl.value = "";
      isAuto = false;
      setStatus("");
      saveState();
      return;
    }

    requestId++;
    const myReqId = requestId;

    setStatus("Übersetze …");

    try {
      const targets = ["de","en","th"].filter(x => x !== from);
      const [a, b] = targets;

      const [ta, tb] = await Promise.all([
        translate(text, from, a, myReqId),
        translate(text, from, b, myReqId)
      ]);

      if (myReqId !== requestId) return;

      isAuto = true;
      if (a === "de") deEl.value = ta;
      if (a === "en") enEl.value = ta;
      if (a === "th") thEl.value = ta;

      if (b === "de") deEl.value = tb;
      if (b === "en") enEl.value = tb;
      if (b === "th") thEl.value = tb;
      isAuto = false;

      setStatus("Fertig.");
      saveState();
    } catch (e) {
      if (myReqId !== requestId) return;
      setStatus("");
      showError("Fehler: " + (e?.message || e));
    }
  }

  deEl.addEventListener("input", () => { schedule("de"); saveState(); });
  enEl.addEventListener("input", () => { schedule("en"); saveState(); });
  thEl.addEventListener("input", () => { schedule("th"); saveState(); });

  btnClear.addEventListener("click", () => {
    showError(""); setStatus("");
    isAuto = true;
    deEl.value = ""; enEl.value = ""; thEl.value = "";
    isAuto = false;
    saveState();
  });

  loadState();
})();
</script>
</body>
</html>
