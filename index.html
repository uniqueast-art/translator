<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Translator DE / EN / TH</title>
  <style>
    *{box-sizing:border-box}
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;margin:0;background:#f4f4f4}
    .wrap{max-width:1050px;margin:0 auto;padding:16px}
    h1{margin:6px 0 6px 0;font-size:22px}
    .muted{color:#666;font-size:13px;margin:0 0 12px 0}
    .card{background:#fff;border-radius:14px;box-shadow:0 2px 10px rgba(0,0,0,.08);padding:14px;margin:12px 0}
    .grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}
    @media (max-width:900px){.grid{grid-template-columns:1fr}}
    label{display:block;font-weight:650;margin:0 0 8px 0}
    textarea{
      width:100%; min-height:170px; resize:vertical;
      padding:12px; border:1px solid #d8d8d8; border-radius:10px;
      font-size:16px; line-height:1.35;
    }
    textarea:focus{outline:2px solid #2563eb33;border-color:#2563eb}
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    button{
      border:1px solid #d8d8d8;background:#fff;border-radius:10px;
      padding:10px 12px;cursor:pointer;font-size:13px
    }
    button:hover{background:#f3f3f3}
    .status{font-size:13px;color:#111}
    .error{font-size:13px;color:#b00020;margin-top:8px}
    .pill{display:inline-block;padding:3px 8px;border-radius:999px;background:#eef2ff;font-size:12px;color:#1f2a44}
    code{background:#f6f6f6;padding:.1rem .25rem;border-radius:4px}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Translator: Deutsch ↔ English ↔ ไทย</h1>
    <p class="muted">
      Backend: <span class="pill">MyMemory (ohne API‑Key)</span>
      — tippen in ein Feld → die anderen zwei werden automatisch übersetzt.
    </p>

    <div class="card">
      <div class="row">
        <button id="btnClear" type="button">Alles leeren</button>
        <span class="status" id="status"></span>
      </div>
      <div class="error" id="err" style="display:none;"></div>
      <p class="muted" style="margin:8px 0 0 0">
        Technisch: <code>GET https://api.mymemory.translated.net/get?q=…&langpair=de|en</code>, Ergebnis: <code>responseData.translatedText</code>. 
      </p>
    </div>

    <div class="grid">
      <div class="card">
        <label for="de">Deutsch (de)</label>
        <textarea id="de" placeholder="Text auf Deutsch …"></textarea>
      </div>
      <div class="card">
        <label for="en">English (en)</label>
        <textarea id="en" placeholder="Text in English …"></textarea>
      </div>
      <div class="card">
        <label for="th">ไทย (th)</label>
        <textarea id="th" placeholder="ข้อความภาษาไทย …"></textarea>
      </div>
    </div>
  </div>

<script>
(() => {
  const API_BASE = "https://api.mymemory.translated.net/get"; // q + langpair=SRC|TGT [web:501][web:495]
  const LS_KEY = "translator_de_en_th_mymemory_v2";

  const el = {
    de: document.getElementById("de"),
    en: document.getElementById("en"),
    th: document.getElementById("th"),
  };
  const statusEl = document.getElementById("status");
  const errEl = document.getElementById("err");
  const btnClear = document.getElementById("btnClear");

  let isAuto = false;
  let debounceTimer = null;
  let req = 0;

  function setStatus(s){ statusEl.textContent = s || ""; }
  function showError(s){
    errEl.style.display = s ? "block" : "none";
    errEl.textContent = s || "";
  }

  function saveState() {
    try {
      localStorage.setItem(LS_KEY, JSON.stringify({
        de: el.de.value, en: el.en.value, th: el.th.value, savedAt: new Date().toISOString()
      }));
    } catch (_) {}
  }
  function loadState() {
    try {
      const raw = localStorage.getItem(LS_KEY);
      if (!raw) return;
      const s = JSON.parse(raw);
      if (typeof s.de === "string") el.de.value = s.de;
      if (typeof s.en === "string") el.en.value = s.en;
      if (typeof s.th === "string") el.th.value = s.th;
    } catch (_) {}
  }

  async function translate(text, src, tgt, myReq) {
    const url = new URL(API_BASE);
    url.searchParams.set("q", text);
    url.searchParams.set("langpair", `${src}|${tgt}`);

    const res = await fetch(url.toString(), { cache: "no-store" });
    const data = await res.json().catch(() => ({}));

    if (myReq !== req) return null; // stale

    const out = data?.responseData?.translatedText;
    if (typeof out !== "string") {
      throw new Error(data?.responseDetails || "Übersetzung fehlgeschlagen");
    }
    return out;
  }

  function schedule(from) {
    if (isAuto) return;
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(() => run(from), 500);
  }

  async function run(from) {
    const text = (el[from].value || "").trim();
    showError("");

    if (!text) {
      isAuto = true;
      for (const k of ["de","en","th"]) if (k !== from) el[k].value = "";
      isAuto = false;
      setStatus("");
      saveState();
      return;
    }

    req++;
    const myReq = req;

    setStatus("Übersetze …");

    try {
      const targets = ["de","en","th"].filter(x => x !== from);
      const [a, b] = targets;

      const [ta, tb] = await Promise.all([
        translate(text, from, a, myReq),
        translate(text, from, b, myReq)
      ]);

      if (myReq !== req) return;

      isAuto = true;
      el[a].value = ta ?? "";
      el[b].value = tb ?? "";
      isAuto = false;

      setStatus("Fertig.");
      saveState();
    } catch (e) {
      if (myReq !== req) return;
      setStatus("");
      showError("Fehler: " + (e?.message || e));
    }
  }

  el.de.addEventListener("input", () => { schedule("de"); saveState(); });
  el.en.addEventListener("input", () => { schedule("en"); saveState(); });
  el.th.addEventListener("input", () => { schedule("th"); saveState(); });

  btnClear.addEventListener("click", () => {
    showError(""); setStatus("");
    isAuto = true;
    el.de.value = ""; el.en.value = ""; el.th.value = "";
    isAuto = false;
    saveState();
  });

  loadState();
})();
</script>
</body>
</html>
