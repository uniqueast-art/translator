<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Offline Translator (DE/EN/TH) – ohne API-Key</title>
  <style>
    *{box-sizing:border-box}
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;margin:0;background:#f4f4f4}
    .wrap{max-width:1000px;margin:0 auto;padding:16px}
    h1{margin:6px 0 4px 0;font-size:22px}
    .muted{color:#666;font-size:13px;margin:0 0 12px 0}
    .card{background:#fff;border-radius:14px;box-shadow:0 2px 10px rgba(0,0,0,.08);padding:14px;margin:12px 0}
    .grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}
    @media (max-width:900px){.grid{grid-template-columns:1fr}}
    label{display:block;font-weight:650;margin:0 0 8px 0}
    textarea{
      width:100%; min-height:170px; resize:vertical;
      padding:12px; border:1px solid #d8d8d8; border-radius:10px;
      font-size:16px; line-height:1.35;
    }
    textarea:focus{outline:2px solid #2563eb33;border-color:#2563eb}
    button{
      border:1px solid #d8d8d8;background:#fff;border-radius:10px;padding:10px 12px;cursor:pointer
    }
    button:hover{background:#f3f3f3}
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .status{font-size:13px;color:#111}
    .error{font-size:13px;color:#b00020}
    code{background:#f6f6f6;padding:.1rem .25rem;border-radius:4px}
  </style>

  <!-- Transformers.js direkt per CDN (kein Bundler nötig) -->
  <script src="https://cdn.jsdelivr.net/npm/@xenova/transformers/dist/transformers.min.js"></script>
</head>
<body>
  <div class="wrap">
    <h1>Translator: Deutsch ↔ English ↔ ไทย</h1>
    <p class="muted">
      Läuft ohne Übersetzungs‑API/Key: Modell wird einmal geladen, Übersetzung läuft dann lokal im Browser.
      (Modell: <code>Xenova/nllb-200-distilled-600M</code>)
    </p>

    <div class="card">
      <div class="row">
        <button id="btnWarmup" type="button">Modell laden</button>
        <button id="btnClear" type="button">Alles leeren</button>
        <span class="status" id="status"></span>
      </div>
      <div class="error" id="err" style="display:none;margin-top:8px;"></div>
      <p class="muted" style="margin:8px 0 0 0">
        Hinweis: Der erste Start kann je nach Gerät/Netz dauern (Modell-Download). Danach geht’s schneller aus Cache.
      </p>
    </div>

    <div class="grid">
      <div class="card">
        <label for="de">Deutsch (de)</label>
        <textarea id="de" placeholder="Text auf Deutsch …"></textarea>
      </div>
      <div class="card">
        <label for="en">English (en)</label>
        <textarea id="en" placeholder="Text in English …"></textarea>
      </div>
      <div class="card">
        <label for="th">ไทย (th)</label>
        <textarea id="th" placeholder="ข้อความภาษาไทย …"></textarea>
      </div>
    </div>
  </div>

<script>
(() => {
  const deEl = document.getElementById('de');
  const enEl = document.getElementById('en');
  const thEl = document.getElementById('th');

  const btnWarmup = document.getElementById('btnWarmup');
  const btnClear = document.getElementById('btnClear');

  const statusEl = document.getElementById('status');
  const errEl = document.getElementById('err');

  // NLLB Sprachcodes
  const LANG = {
    de: 'deu_Latn',
    en: 'eng_Latn',
    th: 'tha_Thai'
  };

  let translator = null;
  let isAuto = false;
  let debounceTimer = null;
  let reqId = 0;

  function setStatus(s){ statusEl.textContent = s || ''; }
  function showError(s){
    errEl.style.display = s ? 'block' : 'none';
    errEl.textContent = s || '';
  }

  async function getTranslator() {
    if (translator) return translator;

    if (!window.transformers?.pipeline) {
      throw new Error('Transformers.js konnte nicht geladen werden (CDN blockiert?).');
    }

    setStatus('Modell wird geladen … (einmalig, kann dauern)');
    showError('');

    // Translation pipeline; Beispiel/Prinzip wie in den Transformers.js docs (translation pipeline + src/tgt). 
    translator = await window.transformers.pipeline(
      'translation',
      'Xenova/nllb-200-distilled-600M'
    );

    setStatus('Modell bereit.');
    return translator;
  }

  async function translateText(text, src, tgt, myReqId) {
    const t = await getTranslator();
    // Wenn währenddessen neu getippt wurde, abbrechen (soft)
    if (myReqId !== reqId) return null;

    const out = await t(text, { src_lang: LANG[src], tgt_lang: LANG[tgt] });
    if (myReqId !== reqId) return null;

    const translated = out?.[0]?.translation_text;
    if (typeof translated !== 'string') throw new Error('Unerwartete Übersetzungsantwort.');
    return translated;
  }

  function schedule(from) {
    if (isAuto) return;
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(() => run(from), 450);
  }

  async function run(from) {
    const map = { de: deEl.value, en: enEl.value, th: thEl.value };
    const text = (map[from] || '').trim();

    showError('');
    if (!text) {
      isAuto = true;
      if (from !== 'de') deEl.value = '';
      if (from !== 'en') enEl.value = '';
      if (from !== 'th') thEl.value = '';
      isAuto = false;
      setStatus('');
      return;
    }

    reqId++;
    const myReqId = reqId;

    try {
      setStatus('Übersetze …');

      const targets = ['de','en','th'].filter(x => x !== from);
      const [a, b] = targets;

      const [ta, tb] = await Promise.all([
        translateText(text, from, a, myReqId),
        translateText(text, from, b, myReqId)
      ]);

      if (myReqId !== reqId) return;

      isAuto = true;
      if (ta !== null) {
        if (a === 'de') deEl.value = ta;
        if (a === 'en') enEl.value = ta;
        if (a === 'th') thEl.value = ta;
      }
      if (tb !== null) {
        if (b === 'de') deEl.value = tb;
        if (b === 'en') enEl.value = tb;
        if (b === 'th') thEl.value = tb;
      }
      isAuto = false;

      setStatus('Fertig.');
    } catch (e) {
      setStatus('');
      showError('Fehler: ' + (e?.message || e));
    }
  }

  btnWarmup.addEventListener('click', () => { getTranslator().catch(e => showError(e.message)); });
  btnClear.addEventListener('click', () => {
    showError(''); setStatus('');
    isAuto = true; deEl.value=''; enEl.value=''; thEl.value=''; isAuto = false;
  });

  deEl.addEventListener('input', () => schedule('de'));
  enEl.addEventListener('input', () => schedule('en'));
  thEl.addEventListener('input', () => schedule('th'));
})();
</script>
</body>
</html>
